name: Release

on:
  workflow_run:
    workflows: ['Check Code']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write # Push release commits and tags
  id-token: write # npm provenance via OIDC

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' ||
        github.event_name == 'workflow_dispatch'
      }}
    steps:
      - name: Generate release token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Validate release token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$APP_TOKEN" ]; then
            echo "::error::Release app token is empty. Check that RELEASE_APP_ID and RELEASE_APP_PRIVATE_KEY secrets are configured."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        run: pnpm release ${{ inputs.dry_run == true && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release failure summary
        if: failure()
        run: |
          echo "::error::Release failed. Check the following:"
          echo "  - GitHub App token: verify RELEASE_APP_ID and RELEASE_APP_PRIVATE_KEY secrets"
          echo "  - GitHub App permissions: contents:write"
          echo "  - App installation on this repository"
          echo "  - NPM_TOKEN secret is valid"
