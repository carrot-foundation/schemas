name: Release

on:
  workflow_run:
    workflows: ['Check Code']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write # Push release commits and tags
  id-token: write # npm Trusted Publishing via OIDC

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' ||
        github.event_name == 'workflow_dispatch'
      }}
    steps:
      - name: Generate release token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Validate release token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$APP_TOKEN" ]; then
            echo "::error::Release app token is empty. Check that RELEASE_APP_ID and RELEASE_APP_PRIVATE_KEY secrets are configured."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Update npm (trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        run: pnpm release ${{ inputs.dry_run == true && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Release failure summary
        if: failure()
        run: |
          echo "::error::Release failed. Check the following:"
          echo "  - GitHub App token: verify RELEASE_APP_ID and RELEASE_APP_PRIVATE_KEY secrets"
          echo "  - GitHub App permissions: contents:write"
          echo "  - App installation on this repository"
          echo "  - npm Trusted Publishing: verify OIDC is configured for this repo at npmjs.com"
