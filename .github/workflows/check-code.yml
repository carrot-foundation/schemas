name: Check Code

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: check-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.check.name }}
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(github.event.head_commit.message || '', '[skip ci]') &&
        !contains(github.event.pull_request.title || '', '[skip ci]')
      }}
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: Lint
            command: pnpm lint
          - name: Format Check
            command: pnpm format:check
          - name: Type Check
            command: pnpm type-check
          - name: Spell Check
            command: pnpm spell-check
          - name: Package JSON Lint
            command: pnpm pkgJsonLint
          - name: Build and Validate
            command: pnpm validate-all
          - name: Test
            command: pnpm test:coverage
          - name: AI Check
            command: pnpm ai:check
          - name: Package Quality
            command: pnpm build && pnpm size-limit && pnpm publint && pnpm check-types-exports && npm pack --dry-run
          - name: Dead Exports
            command: pnpm knip
          - name: License Compliance
            command: pnpm license-check
          - name: Audit
            command: pnpm audit --prod --audit-level=critical
          - name: Schema Compatibility
            command: >-
              git fetch origin main:refs/remotes/origin/main --depth=1 &&
              git worktree add /tmp/baseline-schemas origin/main &&
              cd /tmp/baseline-schemas && pnpm install --frozen-lockfile && pnpm build && pnpm generate-schemas &&
              cd $GITHUB_WORKSPACE &&
              pnpm build && pnpm generate-schemas &&
              BASELINE_SCHEMAS_DIR=/tmp/baseline-schemas/schemas/ipfs pnpm check-schema-compat --advisory

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: ${{ matrix.check.command }}
        # Advisory checks use --advisory flag to exit 0 on findings;
        # infrastructure failures propagate naturally as job failures.

      - name: Upload coverage to Codecov
        if: matrix.check.name == 'Test'
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          files: coverage/cobertura-coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        id: upload-test-results
        if: ${{ !cancelled() && matrix.check.name == 'Test' }}
        continue-on-error: true
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: '**/junit.xml'
          fail_ci_if_error: true

      - name: Warn if test results upload failed
        if: ${{ !cancelled() && steps.upload-test-results.outcome == 'failure' }}
        run: echo "::warning::Codecov test results upload failed -- check step logs above"
