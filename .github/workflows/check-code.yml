name: Check Code

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: check-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.check.name }}
    runs-on: ubuntu-latest
    if: >-
      ${{
        !contains(github.event.head_commit.message || '', '[skip ci]') &&
        !contains(github.event.pull_request.title || '', '[skip ci]')
      }}
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: Lint
            command: pnpm lint
          - name: Format Check
            command: pnpm format:check
          - name: Type Check
            command: pnpm type-check
          - name: Spell Check
            command: pnpm spell-check
          - name: Package JSON Lint
            command: pnpm pkgJsonLint
          - name: Build and Validate
            command: >-
              pnpm build &&
              pnpm generate-schemas &&
              pnpm hash-schemas &&
              pnpm validate-schemas &&
              pnpm verify-schema-versions &&
              pnpm check-refs &&
              pnpm update-examples &&
              pnpm validate-examples
          - name: Test
            command: pnpm test:coverage
          - name: AI Check
            command: pnpm ai:check
          - name: Bundle Size
            command: pnpm build && pnpm size-limit
          - name: Package Validation
            command: pnpm build && pnpm publint && pnpm check-types-exports
          - name: Dead Exports
            command: pnpm knip
          - name: License Compliance
            command: pnpm license-check
          - name: Pack Dry Run
            command: pnpm build && npm pack --dry-run
          - name: Audit
            command: pnpm audit --prod || true
          - name: Schema Compatibility
            command: >-
              git fetch origin main --depth=1 &&
              git worktree add /tmp/baseline-schemas origin/main &&
              cd /tmp/baseline-schemas && pnpm install --frozen-lockfile && pnpm build && pnpm generate-schemas &&
              cd $GITHUB_WORKSPACE &&
              pnpm build && pnpm generate-schemas &&
              BASELINE_SCHEMAS_DIR=/tmp/baseline-schemas/schemas/ipfs pnpm check-schema-compat

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: ${{ matrix.check.command }}
        continue-on-error: ${{ matrix.check.name == 'Schema Compatibility' }}

      - name: Upload coverage to Codecov
        if: matrix.check.name == 'Test'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage/cobertura-coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
